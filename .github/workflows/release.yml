name: release

# Publishing must stay in THIS file: a bot-pushed tag does not trigger other
# workflows, and npm trusted publishing is pinned to this filename.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

      # Below: only when the release PR was just merged.
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.release_created }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.release_created }}
        with:
          bun-version: 1.3.14

      # No `registry-url:` — it writes an .npmrc with an empty _authToken, which
      # npm uses instead of OIDC, failing the publish with a misleading E404.
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
      - run: npm install -g npm@latest
        if: ${{ steps.release.outputs.release_created }}

      - run: bun install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created }}

      - run: bun test
        if: ${{ steps.release.outputs.release_created }}

      - run: bun run build
        if: ${{ steps.release.outputs.release_created }}

      - name: Build .deb
        if: ${{ steps.release.outputs.release_created }}
        run: |
          chmod +x packaging/deb/build.sh
          packaging/deb/build.sh "${{ steps.release.outputs.version }}"

      - name: Name the release asset to match the README's install command
        if: ${{ steps.release.outputs.release_created }}
        run: cp dist/ttm dist/ttm-linux-x64

      - name: Attach the binary and the .deb to the release
        if: ${{ steps.release.outputs.release_created }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            dist/ttm-linux-x64 ttm_*_amd64.deb --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Authenticated by OIDC (trusted publishing). No NPM_TOKEN anywhere.
      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public
