name: release

# Releases are driven by release-please: it reads the Conventional Commits on
# main, keeps a release PR open with the changelog and version bump, and on
# merge it creates the tag and the GitHub Release.
#
# The publish steps live in THIS file, gated on `release_created`, for two
# reasons:
#
#   1. A tag pushed by a bot using the default GITHUB_TOKEN does NOT trigger
#      other workflows (GitHub's loop protection). A separate tag-triggered
#      workflow would simply never run — and would fail silently.
#   2. npm trusted publishing is pinned to this repo AND this workflow filename.
#      Publishing from any other file is rejected by the registry.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      # Everything below runs only when the release PR was just merged.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.release_created }}
        with:
          bun-version: 1.3.14

      # npm publishes via OIDC (trusted publishing), not a stored token.
      # setup-bun does not provide npm, and trusted publishing needs a recent CLI.
      #
      # Deliberately NO `registry-url:` here. It makes setup-node write an .npmrc
      # containing `_authToken=${NODE_AUTH_TOKEN}`; with no token in the env that
      # resolves to an empty credential, npm authenticates with it instead of
      # falling back to OIDC, and the publish fails as a misleading E404.
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
      - run: npm install -g npm@latest
        if: ${{ steps.release.outputs.release_created }}

      - run: bun install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created }}

      - run: bun test
        if: ${{ steps.release.outputs.release_created }}

      - run: bun run build
        if: ${{ steps.release.outputs.release_created }}

      - name: Build .deb
        if: ${{ steps.release.outputs.release_created }}
        run: |
          chmod +x packaging/deb/build.sh
          packaging/deb/build.sh "${{ steps.release.outputs.version }}"

      - name: Name the release asset to match the README's install command
        if: ${{ steps.release.outputs.release_created }}
        run: cp dist/ttm dist/ttm-linux-x64

      - name: Attach the binary and the .deb to the release
        if: ${{ steps.release.outputs.release_created }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            dist/ttm-linux-x64 ttm_*_amd64.deb --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Authenticated by the runner's OIDC identity via npm trusted publishing.
      # No NPM_TOKEN is stored anywhere.
      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public
