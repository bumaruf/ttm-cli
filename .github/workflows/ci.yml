name: ci
on:
  push:
  pull_request:

jobs:
  # Lint is its own job so a formatting slip fails in seconds, instead of
  # waiting behind the compile step.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      # Coverage is reported, not gated: it is information for the reviewer,
      # not a number to game.
      - name: test with coverage
        run: |
          set -euo pipefail
          bun test --coverage 2>&1 | tee coverage.txt
          {
            echo "### Coverage"
            echo ""
            echo '```'
            grep -E "^(File|-|All files)" coverage.txt || cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - run: bun run build

      - name: verify src/builtin-themes.ts is up to date
        run: |
          bun run generate-builtin
          git diff --exit-code src/builtin-themes.ts

      - name: smoke-test compiled binary
        run: |
          set -euo pipefail
          output="$(./dist/ttm --help)"
          echo "$output"
          [ -n "$output" ]
          echo "$output" | grep -q "ttm apply"
