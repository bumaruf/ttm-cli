name: ci
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      # Coverage is reported, not gated.
      - name: test with coverage
        run: |
          set -euo pipefail
          bun test --coverage 2>&1 | tee coverage.txt
          {
            echo "### Coverage"
            echo ""
            echo '```'
            grep -E "^(File|-|All files)" coverage.txt || cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - run: bun run build

      - name: verify src/generated/builtin-themes.ts is up to date
        run: |
          bun run generate-builtin
          git diff --exit-code src/generated/builtin-themes.ts

      - name: smoke-test compiled binary
        run: |
          set -euo pipefail
          output="$(./dist/ttm --help)"
          echo "$output"
          [ -n "$output" ]
          echo "$output" | grep -q "ttm apply"

  # macOS and Windows are served by npm only — no compiled binary, no
  # installer. These jobs prove the code runs natively on those platforms,
  # via the same path real users will use: `bun run` from source and, on
  # Windows, the globally installed npm package.
  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: the CLI must run from source
        run: |
          set -euo pipefail
          output="$(bun run src/cli.ts --help)"
          echo "$output"
          echo "$output" | grep -q "ttm apply"

  smoke-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: the CLI must run from source
        shell: pwsh
        run: |
          $output = (bun run src/cli.ts --help) -join "`n"
          Write-Output $output
          # NB: `$array -notmatch` filters instead of returning a boolean —
          # join into a single string first, or this is always truthy.
          if ($output -notmatch "ttm apply") { exit 1 }

      # The real question for Windows: does the npm-installed bin work at
      # all? The bin is a .ts file with a `#!/usr/bin/env bun` shebang; on
      # Windows npm generates a .cmd shim from it. If that shim is broken,
      # every Windows user is broken, and nothing else in CI would catch it.
      - name: the globally installed `ttm` command must work
        shell: pwsh
        run: |
          npm pack
          $tarball = Get-ChildItem -Filter "*.tgz" | Select-Object -First 1
          npm install -g $tarball.Name
          $output = (ttm --help) -join "`n"
          Write-Output $output
          if ($output -notmatch "ttm apply") { exit 1 }
