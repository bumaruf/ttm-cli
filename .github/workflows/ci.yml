name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run build
      - name: smoke-test compiled binary
        run: |
          set -euo pipefail
          output="$(./dist/ttm --help)"
          echo "$output"
          [ -n "$output" ]
          echo "$output" | grep -q "ttm apply"
