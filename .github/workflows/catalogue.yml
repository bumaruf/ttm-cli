name: catalogue

# The published index is what every ttm out there fetches. It must be rebuilt
# whenever a theme changes — which, with the theme/ split, means any push to main.
on:
  push:
    branches: [main]
    paths:
      - "themes/**"
      - "scripts/generate-index.ts"
      - "src/catalogue/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run scripts/generate-index.ts
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v5
