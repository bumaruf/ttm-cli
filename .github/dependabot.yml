version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # `bun`, not `npm` — the npm ecosystem cannot update bun.lock.
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
