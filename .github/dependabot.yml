version: 2
updates:
  # The workflows pin action versions; without this they quietly rot.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # `bun`, not `npm`: this project's lockfile is bun.lock, and the npm ecosystem
  # cannot update it — it would open PRs that bump package.json and leave the
  # lockfile stale, which `bun install --frozen-lockfile` correctly rejects.
  #
  # Only devDependencies exist here — ttm ships with zero runtime dependencies,
  # and that is a deliberate property of the project.
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
