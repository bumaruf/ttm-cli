# Convenience, not a gate — skippable with --no-verify. CI decides.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: bun run typecheck

    - name: test
      run: bun test
