# Local git hooks, installed by `bun install` (see the `prepare` script).
#
# These are a convenience, not a gate: anyone can skip them with `--no-verify`,
# and that is fine. CI is what actually decides whether a change is acceptable.
# The point here is fast feedback while you work, not enforcement.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: bun run typecheck

    - name: test
      run: bun test
